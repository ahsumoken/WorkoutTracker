<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrainLog">
  <title>TrainLog</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap">
  <style>

:root {
  --bg:     #0a0a0f;
  --bg-2:   #111118;
  --bg-3:   #18181f;
  --bg-4:   #1e1e28;
  --border:        rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.14);
  --text:   #f0f0f8;
  --text-2: #8888a0;
  --text-3: #55556a;

  --accent-blue:   #3b82f6;
  --accent-cyan:   #06b6d4;
  --accent-orange: #f97316;
  --accent-purple: #a855f7;
  --accent-green:  #22c55e;
  --accent-yellow: #eab308;
  --accent-red:    #ef4444;

  --radius:    12px;
  --radius-sm: 8px;
  --header-h:  56px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

body { min-height: 100dvh; overflow-x: hidden; }

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  position: relative;
}

/* ─── HEADER ─── */
#header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding-top: var(--safe-top);
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-mark { color: var(--accent-orange); font-size: 18px; line-height: 1; }
.logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 20px; letter-spacing: 0.12em;
}
.header-actions { display: flex; gap: 4px; }
.icon-btn {
  background: none; border: none; color: var(--text-2);
  cursor: pointer; padding: 8px; border-radius: var(--radius-sm);
  transition: color .15s, background .15s;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn svg { width: 20px; height: 20px; }
.icon-btn:hover { color: var(--text); background: var(--bg-3); }
.icon-btn:active { color: var(--accent-orange); }

/* ─── SCREENS ─── */
.screen { display: none; }
.screen.active { display: block; }

/* ─── HOME ─── */
.home-hero {
  padding: 24px 16px 20px;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(249,115,22,.12) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: .14em;
  color: var(--text-3); font-weight: 600; margin-bottom: 2px;
}
.hero-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 800; text-transform: uppercase;
}
.hero-stats { display: flex; gap: 16px; margin-bottom: 12px; }
.hero-stat { display: flex; flex-direction: column; }
.hero-stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px; font-weight: 800; line-height: 1;
}
.hero-stat-lbl { font-size: 11px; color: var(--text-3); letter-spacing: .06em; margin-top: 2px; }

/* ─── SESSION GRID ─── */
.session-grid {
  padding: 16px 16px 0;
  display: flex; flex-direction: column; gap: 10px;
}
.section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .14em;
  color: var(--text-3); padding: 4px 0;
}
.session-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 14px 14px 18px;
  cursor: pointer; text-align: left;
  position: relative; overflow: hidden;
  transition: border-color .15s, transform .1s, background .15s;
  width: 100%;
}
.session-card:active { transform: scale(0.98); background: var(--bg-3); }
.session-card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.session-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: .16em;
  color: var(--text-3); margin-bottom: 3px;
}
.session-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; letter-spacing: .02em; line-height: 1.1;
}
.session-sub { font-size: 12px; color: var(--text-2); margin-top: 3px; }
.session-sets { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* ─── SESSION HEADER ─── */
.session-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
}
.back-btn {
  background: none; border: none; color: var(--text-2);
  cursor: pointer; padding: 6px; border-radius: var(--radius-sm);
  display: flex; align-items: center; flex-shrink: 0;
}
.back-btn svg { width: 22px; height: 22px; }
.back-btn:active { color: var(--accent-orange); }
.session-title-wrap { flex: 1; }
.session-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 800; letter-spacing: .06em;
}
.session-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; color: var(--text-3); letter-spacing: .04em;
}
.finish-btn {
  background: var(--accent-orange); color: #fff; border: none;
  border-radius: var(--radius-sm);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 800; letter-spacing: .1em;
  padding: 8px 14px; cursor: pointer; transition: opacity .15s; flex-shrink: 0;
}
.finish-btn:active { opacity: .8; }

/* ─── SESSION CONTENT ─── */
#session-content {
  padding: 12px 16px 120px;
}

/* ─── EXERCISE BLOCK (gym) ─── */
.exercise-block {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
}
.exercise-block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.exercise-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; color: var(--text-3);
  letter-spacing: .1em; min-width: 28px;
}
.exercise-name-block { flex: 1; }
.exercise-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 700; letter-spacing: .02em;
}
.exercise-spec { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.pr-badge {
  background: rgba(34,197,94,0.15); color: var(--accent-green);
  border-radius: 4px; font-size: 11px; font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  padding: 2px 6px; letter-spacing: .06em;
}

/* Sets table */
.sets-table { padding: 10px 14px; }
.set-headers {
  display: grid; grid-template-columns: 28px 1fr 1fr 60px;
  gap: 6px; margin-bottom: 4px;
}
.set-row {
  display: grid; grid-template-columns: 28px 1fr 1fr 60px;
  gap: 6px; align-items: center; margin-bottom: 6px;
}
.set-row:last-child { margin-bottom: 0; }
.set-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; color: var(--text-3); font-weight: 600; text-align: center;
}
.set-label { font-size: 10px; color: var(--text-3); text-align: center; letter-spacing: .04em; }
.set-input {
  background: var(--bg-3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 500;
  padding: 8px 10px; width: 100%; text-align: center;
  -webkit-appearance: none; transition: border-color .15s;
}
.set-input:focus { outline: none; border-color: var(--accent-orange); background: var(--bg-4); }
.set-input::placeholder { color: var(--text-3); }
.set-input.improved { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.05); }

/* Exercise footer */
.exercise-footer {
  border-top: 1px solid var(--border);
  padding: 10px 14px; display: flex; gap: 8px; align-items: flex-start;
}
.note-input {
  flex: 1; background: var(--bg-3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'Barlow', sans-serif; font-size: 13px;
  padding: 8px 10px; resize: none; height: 60px; transition: border-color .15s;
}
.note-input:focus { outline: none; border-color: rgba(249,115,22,0.4); }
.note-input::placeholder { color: var(--text-3); }

/* ─── CIRCUIT BLOCK ─── */
.circuit-block {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
}
.circuit-start-row {
  padding: 14px; display: flex; align-items: center; justify-content: space-between;
}
.circuit-start-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700;
}
.circuit-sub { font-size: 12px; color: var(--text-3); }
.btn-start-timer {
  background: var(--accent-orange); color: #fff; border: none;
  border-radius: var(--radius-sm);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 800; letter-spacing: .1em;
  padding: 10px 18px; cursor: pointer; transition: opacity .15s;
}
.btn-start-timer:active { opacity: .8; }
.circuit-exercises { border-top: 1px solid var(--border); padding: 10px 14px; }
.circuit-ex-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.circuit-ex-row:last-child { border-bottom: none; }
.circuit-ex-num {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; color: var(--text-3); min-width: 20px;
}
.circuit-ex-name { flex: 1; font-size: 14px; }
.circuit-ex-weight {
  font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
  font-weight: 700; color: var(--text-3);
}
.circuit-log { padding: 12px 14px; border-top: 1px solid var(--border); }
.circuit-log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.log-field { display: flex; flex-direction: column; gap: 4px; }
.log-field label { font-size: 10px; color: var(--text-3); letter-spacing: .06em; font-weight: 600; text-transform: uppercase; }
.log-field input, .log-field select {
  background: var(--bg-3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 500;
  padding: 9px 10px; transition: border-color .15s; -webkit-appearance: none;
}
.log-field input:focus, .log-field select:focus { outline: none; border-color: var(--accent-orange); }

/* ─── SNACK OPTIONS ─── */
.snack-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.snack-option {
  background: var(--bg-2); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: border-color .15s, background .15s; width: 100%;
}
.snack-option.selected {
  border-color: var(--accent-yellow);
  background: rgba(234,179,8,0.06);
}
.snack-option-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 700;
}
.snack-option-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  color: var(--accent-yellow);
  background: rgba(234,179,8,0.12);
  border-radius: 4px; padding: 2px 7px;
}
.snack-option-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.snack-exercises { font-size: 12px; color: var(--text-2); margin-top: 5px; line-height: 1.6; }

/* ─── SNACK TIMER AREA ─── */
.snack-timer-area {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
  display: none;
}
.snack-timer-area.visible { display: block; }
.snack-timer-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .1em;
  color: var(--text-3); margin-bottom: 10px;
}

/* ─── FINISHER ─── */
.finisher-block {
  background: rgba(168,85,247,0.06); border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius); padding: 14px; margin-top: 4px;
}
.finisher-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800;
  color: var(--accent-purple); letter-spacing: .1em; margin-bottom: 8px;
}
.finisher-check { display: flex; gap: 8px; margin-top: 10px; }
.check-btn {
  flex: 1; background: var(--bg-3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-2);
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  padding: 8px; cursor: pointer; transition: all .15s; text-align: center;
}
.check-btn.done {
  background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--accent-green);
}

/* ─── TIMER MODAL ─── */
.timer-box {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px; padding: 28px 20px 24px;
}
.timer-phase {
  font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800;
  letter-spacing: .2em; color: var(--accent-orange);
  padding: 4px 14px; border: 1px solid rgba(249,115,22,0.3);
  border-radius: 20px; background: rgba(249,115,22,0.08);
}
.timer-phase.rest-phase { color: var(--accent-blue); border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }
.timer-phase.round-rest-phase { color: var(--accent-cyan); border-color: rgba(6,182,212,0.3); background: rgba(6,182,212,0.08); }
.timer-progress-wrap { position: relative; width: 200px; height: 200px; }
.timer-ring { width: 200px; height: 200px; transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--bg-4); stroke-width: 8; }
.timer-ring-fg {
  fill: none; stroke: var(--accent-orange); stroke-width: 8;
  stroke-linecap: round; stroke-dasharray: 553; stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.2s linear, stroke .3s;
}
.timer-ring-fg.rest { stroke: var(--accent-blue); }
.timer-ring-fg.round-rest { stroke: var(--accent-cyan); }
.timer-display {
  font-family: 'Barlow Condensed', sans-serif; font-size: 80px; font-weight: 900;
  color: var(--text); line-height: 1; letter-spacing: -.02em;
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.timer-meta { text-align: center; }
.timer-set, .timer-round {
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600;
  color: var(--text-2); letter-spacing: .06em;
}
.timer-exercise {
  font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800;
  color: var(--text); margin-top: 4px;
}
.timer-controls { display: flex; gap: 12px; align-items: center; }
.btn-timer {
  background: var(--bg-3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); cursor: pointer;
  padding: 12px 20px; display: flex; align-items: center; gap: 6px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  letter-spacing: .08em; transition: background .15s;
}
.btn-timer svg { width: 18px; height: 18px; }
.btn-timer:active { background: var(--bg-4); }
.btn-timer-stop { color: var(--accent-red); border-color: rgba(239,68,68,0.3); }

/* ─── REST BANNER ─── */
.rest-banner {
  position: fixed;
  bottom: calc(16px + var(--safe-bot));
  left: 50%; transform: translateX(-50%);
  width: calc(100% - 32px); max-width: 448px;
  background: var(--bg-3); border: 1px solid var(--border-bright);
  border-radius: var(--radius); overflow: hidden;
  z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,.6);
}
.rest-inner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.rest-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 800; letter-spacing: .14em; color: var(--accent-blue);
}
.rest-time {
  font-family: 'Barlow Condensed', sans-serif; font-size: 28px;
  font-weight: 900; line-height: 1; flex: 1;
}
.rest-unit { font-size: 12px; color: var(--text-3); margin-top: 8px; align-self: flex-end; }
.rest-skip {
  background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-2); font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .08em; padding: 6px 12px; cursor: pointer;
}
.rest-bar-wrap { height: 3px; background: var(--bg-4); }
.rest-bar { height: 100%; background: var(--accent-blue); transition: width .5s linear; }

.hidden { display: none !important; }

.hidden { display: none !important; }

/* ─── MODAL ─── */
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); }
.modal-box {
  position: relative; background: var(--bg-2);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%; max-width: 480px; margin: 0 auto;
  padding: 20px 16px calc(20px + var(--safe-bot));
  max-height: 85dvh; display: flex; flex-direction: column; gap: 14px;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px;
  font-weight: 800; letter-spacing: .1em; color: var(--text-2);
}
#export-text {
  background: var(--bg-3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-2);
  font-family: monospace; font-size: 12px; line-height: 1.6;
  padding: 12px; resize: none; flex: 1;
  min-height: 240px; max-height: 40dvh; overflow-y: auto;
}
.modal-actions { display: flex; gap: 8px; }
.btn-primary {
  background: var(--accent-orange); color: #fff; border: none;
  border-radius: var(--radius-sm);
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
  font-weight: 800; letter-spacing: .08em; padding: 12px 20px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: opacity .15s; flex: 1; justify-content: center;
}
.btn-primary svg { width: 16px; height: 16px; }
.btn-primary:active { opacity: .8; }
.btn-secondary {
  background: var(--bg-3); color: var(--text-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .06em; padding: 12px 14px;
  cursor: pointer; transition: background .15s; flex: 1;
}
.btn-secondary:active { background: var(--bg-4); }

/* ─── HISTORY ─── */
.history-list { padding: 12px 16px 100px; }
.history-item {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
  cursor: pointer; transition: border-color .15s;
}
.history-item:hover { border-color: var(--border-bright); }
.history-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.history-date { font-size: 11px; color: var(--text-3); letter-spacing: .04em; }
.history-type {
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px;
  font-weight: 800; letter-spacing: .02em;
}
.history-duration { font-size: 11px; color: var(--text-3); letter-spacing: .04em; }
.history-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.history-tag {
  background: var(--bg-3); border-radius: 4px; font-size: 11px;
  color: var(--text-3); padding: 2px 8px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: .04em;
}
.history-tag.green { background: rgba(34,197,94,0.1); color: var(--accent-green); }
.history-empty {
  text-align: center; color: var(--text-3); padding: 60px 20px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px;
  font-weight: 600; letter-spacing: .04em;
}

/* ─── FIELD GROUP ─── */
.field-group { margin-bottom: 10px; }
.field-group label {
  display: block; font-size: 10px; color: var(--text-3);
  letter-spacing: .06em; font-weight: 600; text-transform: uppercase; margin-bottom: 4px;
}
.field-group input, .field-group textarea, .field-group select {

// ─── CIRCUIT TIMER ─────────────────────────────────────────────────────────

const Timer = (() => {
  let iv = null;
  let wl = null;
  let st = null;
  let exNames = [];
  const CIRC = 2 * Math.PI * 88; // r=88

  function el(id) { return document.getElementById(id); }

  async function grabWakeLock() {
    if ('wakeLock' in navigator) {
      try { wl = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }
  async function dropWakeLock() {
    if (wl) { try { await wl.release(); } catch(e) {} wl = null; }
  }

  function beep(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      if (type === 'work') {
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc.start(); osc.stop(ctx.currentTime + 0.25);
      } else if (type === 'rest') {
        osc.frequency.value = 440;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      } else {
        [0, 0.2, 0.4].forEach(t => {
          const o = ctx.createOscillator(); const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = 1100;
          g.gain.setValueAtTime(0.4, ctx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
          o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.15);
        });
      }
    } catch(e) {}
  }

  function draw() {
    if (!st) return;
    const { seconds, phase, workSec, restSec, roundRestSec, currentSet, totalSets, currentRound, totalRounds } = st;

    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    el('timer-display').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;

    const phaseEl = el('timer-phase');
    const fg = el('timer-ring-fg');
    let duration = workSec;
    if (phase === 'work') {
      phaseEl.textContent = 'WERK'; phaseEl.className = 'timer-phase';
      fg.className = 'timer-ring-fg'; duration = workSec;
    } else if (phase === 'rest') {
      phaseEl.textContent = 'RUST'; phaseEl.className = 'timer-phase rest-phase';
      fg.className = 'timer-ring-fg rest'; duration = restSec;
    } else {
      phaseEl.textContent = 'RONDE RUST'; phaseEl.className = 'timer-phase round-rest-phase';
      fg.className = 'timer-ring-fg round-rest'; duration = roundRestSec;
    }
    fg.style.strokeDashoffset = CIRC * (1 - seconds / duration);

    el('timer-set-info').textContent   = `Set ${currentSet} / ${totalSets}`;
    el('timer-round-info').textContent = `Ronde ${currentRound} / ${totalRounds}`;
    const exIdx = (currentSet - 1) % exNames.length;
    el('timer-exercise-name').textContent = phase === 'roundRest' ? '— rust —' : (exNames[exIdx] || '');
  }

  function next() {
    if (!st) return;
    const perRound = st.totalSets / st.totalRounds;
    const isLastSetInRound = st.currentSet % perRound === 0;
    const isLast = st.currentSet === st.totalSets;

    if (st.phase === 'work') {
      if (isLast) { beep('done'); stop(); if (st.onComplete) st.onComplete(); return; }
      else if (isLastSetInRound) { st.currentRound++; st.phase = 'roundRest'; st.seconds = st.roundRestSec; beep('rest'); }
      else { st.phase = 'rest'; st.seconds = st.restSec; beep('rest'); }
    } else {
      st.currentSet++; st.phase = 'work'; st.seconds = st.workSec; beep('work');
    }
    draw();
  }

  function tick() { if (!st) return; st.seconds--; st.seconds <= 0 ? next() : draw(); }

  function start({ totalSets, totalRounds, workSec, restSec, roundRestSec, exercises, onComplete }) {
    exNames = exercises || [];
    st = { totalSets, totalRounds, workSec, restSec, roundRestSec,
           phase: 'work', currentSet: 1, currentRound: 1, seconds: workSec, paused: false, onComplete };
    grabWakeLock();
    el('modal-timer').style.display='flex';
    draw(); beep('work');
    iv = setInterval(tick, 1000);
  }

  function pause() {
    if (!st) return;
    if (st.paused) {
      st.paused = false; iv = setInterval(tick, 1000);
      el('btn-timer-pause').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    } else {
      st.paused = true; clearInterval(iv); iv = null;
      el('btn-timer-pause').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    }
  }

  function stop() {
    clearInterval(iv); iv = null; st = null; exNames = [];
    dropWakeLock();
    el('modal-timer').style.display='none';
  }

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && iv && !wl) await grabWakeLock();
  });

  document.addEventListener('DOMContentLoaded', () => {
    el('btn-timer-pause').addEventListener('click', pause);
    el('btn-timer-stop').addEventListener('click', stop);
  });

  return { start, stop, pause };
})();

// ─── REST BANNER ───────────────────────────────────────────────────────────

const RestBanner = (() => {
  let iv = null;

  function show(seconds, onDone) {
    clearInterval(iv);
    let rem = seconds;
    const banner = document.getElementById('rest-banner');
    const timeEl = document.getElementById('rest-time-display');
    const barEl  = document.getElementById('rest-bar');
    banner.style.display='block';
    timeEl.textContent = rem;
    barEl.style.width = '100%';
    iv = setInterval(() => {
      rem--;
      timeEl.textContent = rem;
      barEl.style.width = `${(rem / seconds) * 100}%`;
      if (rem <= 0) { hide(); if (onDone) onDone(); }
    }, 1000);
    document.getElementById('btn-skip-rest').onclick = () => { hide(); if (onDone) onDone(); };
  }

  function hide() {
    clearInterval(iv); iv = null;
    document.getElementById('rest-banner').style.display='none';
  }

  return { show, hide };
})();

const Session = (() => {
  let currentType = null;
  let sessionData = {};
  let startTime   = null;
  let sessionIv   = null;
  let wl          = null;

  async function grabWL() {
    if ('wakeLock' in navigator) { try { wl = await navigator.wakeLock.request('screen'); } catch(e) {} }
  }
  async function dropWL() {
    if (wl) { try { await wl.release(); } catch(e) {} wl = null; }
  }

  function startClock() {
    startTime = Date.now();
    const el = document.getElementById('session-timer');
    sessionIv = setInterval(() => {
      const s = Math.floor((Date.now() - startTime) / 1000);
      el.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }, 1000);
  }

  function stopClock() {
    clearInterval(sessionIv); sessionIv = null;
    return startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  }

  // ── PUBLIC: open ──────────────────────────────────────────────────────────

  function open(type) {
    currentType = type;
    sessionData = {};
    const def = SESSION_TYPES[type];
    document.getElementById('session-title').textContent = def.name;
    document.getElementById('session-timer').textContent = '00:00';
    const content = document.getElementById('session-content');
    content.innerHTML = '';

    if      (def.type === 'gym')    renderGym(def, content);
    else if (def.type === 'circuit') renderCircuit(def, content);
    else if (def.type === 'snacks')  renderSnacks(def, content);

    showScreen('screen-session');
    startClock();
    grabWL();
  }

  // ── GYM ───────────────────────────────────────────────────────────────────

  function renderGym(def, container) {
    const prev = DB.getLastByType(currentType);

    def.exercises.forEach((ex, i) => {
      const prevEx = prev?.exercises?.[ex.id] || null;
      const block  = document.createElement('div');
      block.className = 'exercise-block';

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'exercise-block-header';
      hdr.innerHTML = `
        <div class="exercise-num">${String(i+1).padStart(2,'0')}</div>
        <div class="exercise-name-block">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="exercise-name">${ex.name}</div>
            <div class="pr-badge" id="pr-${ex.id}" style="display:none">↑ PR</div>
          </div>
          <div class="exercise-spec">${ex.sets} sets × ${ex.reps}${prevEx ? ` · Vorige: ${prevEx.sets?.[0]?.weight||'?'}kg` : ''}</div>
        </div>`;
      block.appendChild(hdr);

      // Sets
      const tbl = document.createElement('div');
      tbl.className = 'sets-table';
      tbl.innerHTML = `<div class="set-headers">
        <div class="set-label">SET</div>
        <div class="set-label">KG</div>
        <div class="set-label">REPS</div>
        <div class="set-label">RPE</div>
      </div>`;
      sessionData[ex.id] = { sets: [], note: '', name: ex.name };

      for (let s = 0; s < ex.sets; s++) {
        const ps = prevEx?.sets?.[s];
        sessionData[ex.id].sets[s] = { weight: '', reps: '', rpe: '' };
        const row = document.createElement('div');
        row.className = 'set-row';
        row.innerHTML = `
          <div class="set-num">${s+1}</div>
          <input class="set-input" type="number" inputmode="decimal" placeholder="${ps?.weight||'—'}" data-ex="${ex.id}" data-s="${s}" data-f="weight">
          <input class="set-input" type="number" inputmode="numeric" placeholder="${ps?.reps||'—'}" data-ex="${ex.id}" data-s="${s}" data-f="reps">
          <input class="set-input" type="number" inputmode="numeric" placeholder="RPE" min="1" max="10" data-ex="${ex.id}" data-s="${s}" data-f="rpe" style="font-size:13px">`;
        row.querySelectorAll('.set-input').forEach(inp => {
          inp.addEventListener('input', () => {
            sessionData[ex.id].sets[parseInt(inp.dataset.s)][inp.dataset.f] = inp.value;
            checkPR(ex.id, prevEx);
          });
        });
        tbl.appendChild(row);
      }
      block.appendChild(tbl);

      // Note
      const foot = document.createElement('div');
      foot.className = 'exercise-footer';
      foot.innerHTML = `<textarea class="note-input" placeholder="Notitie..." data-ex="${ex.id}"></textarea>`;
      foot.querySelector('textarea').addEventListener('input', e => { sessionData[ex.id].note = e.target.value; });
      block.appendChild(foot);
      container.appendChild(block);
    });

    container.appendChild(gymFooter());
  }

  function checkPR(exId, prevEx) {
    if (!prevEx) return;
    const badge = document.getElementById(`pr-${exId}`);
    if (!badge) return;
    const improved = sessionData[exId].sets.some((set, i) => {
      const p = prevEx.sets?.[i];
      if (!p) return false;
      return parseFloat(set.weight) > parseFloat(p.weight||0) || parseInt(set.reps) > parseInt(p.reps||0);
    });
    badge.style.display = improved ? '' : 'none';
  }

  function gymFooter() {
    const d = document.createElement('div');
    d.style.marginTop = '8px';
    d.innerHTML = `
      <div class="circuit-block">
        <div class="circuit-log">
          <div class="field-group"><label>SESSIE RPE (1-10)</label>
            <input type="number" inputmode="numeric" id="gym-rpe" placeholder="7" min="1" max="10"></div>
          <div class="field-group"><label>SESSIE NOTITIE</label>
            <textarea id="gym-note" placeholder="Algemene notitie..." style="background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:9px 12px;width:100%;resize:none;height:80px;"></textarea>
          </div>
        </div>
      </div>`;
    d.querySelector('#gym-rpe').addEventListener('input',  e => { sessionData._rpe  = parseInt(e.target.value)||null; });
    d.querySelector('#gym-note').addEventListener('input', e => { sessionData._note = e.target.value; });
    return d;
  }

  // ── CIRCUIT ───────────────────────────────────────────────────────────────

  function renderCircuit(def, container) {
    const prev = DB.getLastByType(currentType);
    sessionData = { rounds: 0, rpe: null, note: '', finisher: [] };

    // Timer launch block
    const startBlock = document.createElement('div');
    startBlock.className = 'circuit-block';
    const totalSets = def.exercises.length * def.rounds;
    startBlock.innerHTML = `
      <div class="circuit-start-row">
        <div>
          <div class="circuit-start-label">${def.name}</div>
          <div class="circuit-sub">${totalSets} sets · ${def.workSec}s werk / ${def.restSec}s rust · ${def.rounds} ronden · ${def.roundRestSec}s rondrust</div>
        </div>
        <button class="btn-start-timer" id="btn-cir-start">▶ START</button>
      </div>`;
    startBlock.querySelector('#btn-cir-start').addEventListener('click', () => {
      Timer.start({
        totalSets, totalRounds: def.rounds,
        workSec: def.workSec, restSec: def.restSec, roundRestSec: def.roundRestSec,
        exercises: def.exercises.map(e => e.name),
        onComplete: () => showToast('Circuit klaar! 🔥')
      });
    });

    // Exercise list
    const exBlock = document.createElement('div');
    exBlock.className = 'circuit-block';
    let exHtml = `<div style="padding:12px 14px;border-bottom:1px solid var(--border)"><div class="section-title">OEFENINGEN</div></div>
                  <div class="circuit-exercises">`;
    def.exercises.forEach((ex, i) => {
      exHtml += `<div class="circuit-ex-row">
        <div class="circuit-ex-num">${i+1}</div>
        <div class="circuit-ex-name">${ex.name}</div>
        <div class="circuit-ex-weight">${ex.defaultWeight}</div>
      </div>`;
    });
    exHtml += `</div>`;

    const prevBadge = prev?.rounds ? ` <span style="font-size:11px;color:var(--text-3)">Vorige: ${prev.rounds}</span>` : '';
    exHtml += `<div class="circuit-log">
      <div class="circuit-log-grid">
        <div class="log-field"><label>RONDEN${prevBadge}</label>
          <input type="number" inputmode="numeric" id="cir-rounds" placeholder="${def.rounds}" min="0" max="${def.rounds}"></div>
        <div class="log-field"><label>RPE (1-10)</label>
          <input type="number" inputmode="numeric" id="cir-rpe" placeholder="7" min="1" max="10"></div>
      </div>
      <div class="field-group"><label>NOTITIE</label>
        <textarea id="cir-note" placeholder="Hoe voelde het?" style="background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:9px 12px;width:100%;resize:none;height:70px;"></textarea>
      </div>
      <div class="improved-hint" id="cir-pr" style="display:none">↑ Meer ronden dan vorige sessie!</div>
    </div>`;
    exBlock.innerHTML = exHtml;

    exBlock.querySelector('#cir-rounds').addEventListener('input', e => {
      sessionData.rounds = parseInt(e.target.value)||0;
      document.getElementById('cir-pr').style.display =
        (prev && sessionData.rounds > (prev.rounds||0)) ? 'flex' : 'none';
    });
    exBlock.querySelector('#cir-rpe').addEventListener('input',  e => { sessionData.rpe  = parseInt(e.target.value)||null; });
    exBlock.querySelector('#cir-note').addEventListener('input', e => { sessionData.note = e.target.value; });

    container.appendChild(startBlock);
    container.appendChild(exBlock);

    // Finisher
    if (def.finisher) {
      sessionData.finisher = def.finisher.map(f => ({ name: f.name, done: false }));
      const fin = document.createElement('div');
      fin.className = 'finisher-block';
      fin.innerHTML = `<div class="finisher-title">FINISHER</div>
        ${def.finisher.map(f=>`<div style="font-size:13px;color:var(--text-2);margin-bottom:3px">${f.name}</div>`).join('')}
        <div class="finisher-check" id="fin-checks"></div>`;
      def.finisher.forEach((f, i) => {
        const btn = document.createElement('button');
        btn.className = 'check-btn';
        btn.textContent = f.name.replace('3×10 ','');
        btn.addEventListener('click', () => {
          sessionData.finisher[i].done = !sessionData.finisher[i].done;
          btn.classList.toggle('done', sessionData.finisher[i].done);
          btn.textContent = (sessionData.finisher[i].done ? '✓ ' : '') + f.name.replace('3×10 ','');
        });
        fin.querySelector('#fin-checks').appendChild(btn);
      });
      container.appendChild(fin);
    }
  }

  // ── SNACKS ────────────────────────────────────────────────────────────────

  function renderSnacks(def, container) {
    sessionData = { snackId: null, snackName: '', rounds: 0, rpe: null, note: '' };

    // Title
    const title = document.createElement('div');
    title.className = 'section-title';
    title.style.marginBottom = '10px';
    title.textContent = 'KIES EEN SNACK';
    container.appendChild(title);

    // Snack option cards
    const optList = document.createElement('div');
    optList.className = 'snack-options';

    // Timer area (hidden until snack selected)
    const timerArea = document.createElement('div');
    timerArea.className = 'snack-timer-area';
    timerArea.id = 'snack-timer-area';

    def.options.forEach(opt => {
      const card = document.createElement('button');
      card.className = 'snack-option';
      card.dataset.id = opt.id;
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div class="snack-option-name">${opt.name}</div>
          <div class="snack-option-badge">${opt.duration}</div>
        </div>
        <div class="snack-option-desc">${opt.protocol}</div>
        <div class="snack-exercises">${opt.exercises.join('<br>')}</div>`;

      card.addEventListener('click', () => {
        optList.querySelectorAll('.snack-option').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        sessionData.snackId   = opt.id;
        sessionData.snackName = opt.name;
        buildSnackTimerArea(opt, timerArea);
        timerArea.classList.add('visible');
      });

      optList.appendChild(card);
    });

    container.appendChild(optList);
    container.appendChild(timerArea);

    // Log block (always visible)
    const logBlock = document.createElement('div');
    logBlock.className = 'circuit-block';
    logBlock.innerHTML = `
      <div class="circuit-log">
        <div class="circuit-log-grid">
          <div class="log-field"><label>RONDEN</label>
            <input type="number" inputmode="numeric" id="snack-rounds" placeholder="3" min="0"></div>
          <div class="log-field"><label>RPE (1-10)</label>
            <input type="number" inputmode="numeric" id="snack-rpe" placeholder="7" min="1" max="10"></div>
        </div>
        <div class="field-group"><label>NOTITIE</label>
          <textarea id="snack-note" placeholder="Hoe voelde het?" style="background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:9px 12px;width:100%;resize:none;height:70px;"></textarea>
        </div>
        <div class="improved-hint" id="snack-pr" style="display:none">↑ Meer ronden of betere RPE dan vorige keer!</div>
      </div>`;

    logBlock.querySelector('#snack-rounds').addEventListener('input', e => {
      sessionData.rounds = parseInt(e.target.value)||0;
      checkSnackPR();
    });
    logBlock.querySelector('#snack-rpe').addEventListener('input', e => {
      sessionData.rpe = parseInt(e.target.value)||null;
      checkSnackPR();
    });
    logBlock.querySelector('#snack-note').addEventListener('input', e => { sessionData.note = e.target.value; });

    container.appendChild(logBlock);
  }

  function buildSnackTimerArea(opt, area) {
    area.innerHTML = `<div class="snack-timer-title">TIMER — ${opt.name}</div>`;

    if (opt.protocol === 'AMRAP') {
      // Simple stopwatch for AMRAP
      let running = false, elapsed = 0, iv = null;
      const display = document.createElement('div');
      display.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:48px;font-weight:900;color:var(--text);margin-bottom:10px';
      display.textContent = '10:00';

      // Countdown from 10 min
      let remaining = 600;
      const btn = document.createElement('button');
      btn.className = 'btn-start-timer';
      btn.textContent = '▶ START AMRAP (10 min)';
      btn.addEventListener('click', () => {
        if (!running) {
          running = true; btn.textContent = '■ STOP';
          iv = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining/60), s = remaining%60;
            display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (remaining <= 0) { clearInterval(iv); running = false; btn.textContent = '▶ OPNIEUW'; remaining = 600; showToast('AMRAP klaar! 🔥'); }
          }, 1000);
        } else {
          clearInterval(iv); running = false; remaining = 600;
          display.textContent = '10:00'; btn.textContent = '▶ START AMRAP (10 min)';
        }
      });
      area.appendChild(display);
      area.appendChild(btn);
    } else {
      // Ronden met rust-pauze
      let currentRound = 1;
      const totalRounds = opt.rounds || 3;
      const restSec = opt.restSec || 30;

      const info = document.createElement('div');
      info.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:10px';
      info.textContent = `Ronde ${currentRound} / ${totalRounds}`;

      const exList = document.createElement('div');
      exList.style.cssText = 'font-size:13px;color:var(--text-2);margin-bottom:12px;line-height:1.7';
      exList.innerHTML = opt.exercises.map(e => `• ${e}`).join('<br>');

      const btn = document.createElement('button');
      btn.className = 'btn-start-timer';
      btn.textContent = currentRound === 1 ? '▶ START' : `▶ RONDE ${currentRound}`;

      btn.addEventListener('click', () => {
        if (currentRound > totalRounds) return;
        btn.disabled = true;
        btn.textContent = 'BEZIG...';

        // After pressing: show rest countdown (except after last round)
        const doneRound = currentRound;
        currentRound++;
        sessionData.rounds = doneRound; // update live
        document.getElementById('snack-rounds').value = doneRound;

        if (currentRound <= totalRounds && restSec > 0) {
          info.textContent = `Ronde ${doneRound} klaar!`;
          RestBanner.show(restSec, () => {
            if (currentRound <= totalRounds) {
              info.textContent = `Ronde ${currentRound} / ${totalRounds}`;
              btn.textContent = `▶ RONDE ${currentRound}`;
              btn.disabled = false;
            } else {
              info.textContent = 'Klaar! 🔥';
              btn.textContent = '✓ VOLTOOID';
              btn.style.background = 'var(--accent-green)';
              showToast(`${opt.name} klaar! 💪`);
            }
          });
        } else if (currentRound <= totalRounds) {
          info.textContent = `Ronde ${currentRound} / ${totalRounds}`;
          btn.textContent = `▶ RONDE ${currentRound}`;
          btn.disabled = false;
        } else {
          info.textContent = 'Klaar! 🔥';
          btn.textContent = '✓ VOLTOOID';
          btn.style.background = 'var(--accent-green)';
          showToast(`${opt.name} klaar! 💪`);
        }
      });

      area.appendChild(info);
      area.appendChild(exList);
      area.appendChild(btn);
    }
  }

  function checkSnackPR() {
    if (!sessionData.snackId) return;
    const prev = DB.getLastSnack(sessionData.snackId);
    if (!prev) return;
    const better = sessionData.rounds > (prev.rounds||0) || (sessionData.rpe && prev.rpe && sessionData.rpe < prev.rpe);
    document.getElementById('snack-pr').style.display = better ? 'flex' : 'none';
  }

  // ── FINISH + SAVE ─────────────────────────────────────────────────────────

  function finish() {
    const def = SESSION_TYPES[currentType];
    const duration = stopClock();
    dropWL();

    let data = { type: currentType, timestamp: Date.now(), date: new Date().toISOString(), duration };

    if (def.type === 'gym') {
      // Collect set inputs from DOM
      const exercises = {};
      def.exercises.forEach(ex => {
        const sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = document.querySelector(`input[data-ex="${ex.id}"][data-s="${s}"][data-f="weight"]`);
          const r = document.querySelector(`input[data-ex="${ex.id}"][data-s="${s}"][data-f="reps"]`);
          const p = document.querySelector(`input[data-ex="${ex.id}"][data-s="${s}"][data-f="rpe"]`);
          sets.push({ weight: w?.value||'', reps: r?.value||'', rpe: p?.value||'' });
        }
        const n = document.querySelector(`textarea[data-ex="${ex.id}"]`);
        exercises[ex.id] = { sets, note: n?.value||'', name: ex.name };
      });
      data = { ...data, exercises,
        globalRpe:  parseInt(document.getElementById('gym-rpe')?.value)||null,
        globalNote: document.getElementById('gym-note')?.value||'' };

    } else if (def.type === 'circuit') {
      data = { ...data,
        rounds:   parseInt(document.getElementById('cir-rounds')?.value)||sessionData.rounds,
        rpe:      parseInt(document.getElementById('cir-rpe')?.value)||sessionData.rpe,
        note:     document.getElementById('cir-note')?.value||sessionData.note,
        finisher: sessionData.finisher||[] };

    } else if (def.type === 'snacks') {
      data = { ...data,
        snackId:   sessionData.snackId,
        snackName: sessionData.snackName,
        rounds:    parseInt(document.getElementById('snack-rounds')?.value)||sessionData.rounds,
        rpe:       parseInt(document.getElementById('snack-rpe')?.value)||sessionData.rpe,
        note:      document.getElementById('snack-note')?.value||sessionData.note };
    }

    DB.saveSession(data);
    showToast('Sessie opgeslagen! 💪');
    showScreen('screen-home');
    App.refreshHome();
    setTimeout(() => Export.showForSession(data), 600);
  }

  function close() { stopClock(); dropWL(); currentType = null; sessionData = {}; }

  return { open, finish, close };
})();
const History = (() => {
  function render() {
    const container = document.getElementById('history-content');
    container.innerHTML = '';
    const sessions = DB.getAll();

    if (!sessions.length) {
      container.innerHTML = `<div class="history-empty">Nog geen sessies gelogd.<br>Begin met je eerste workout!</div>`;
      return;
    }

    sessions.forEach(s => container.appendChild(buildItem(s)));
  }

  function buildItem(s) {
    const def = SESSION_TYPES[s.type];
    if (!def) return document.createElement('div');

    const d = new Date(s.timestamp || s.date);
    const dateStr = d.toLocaleDateString('nl-NL', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    const timeStr = d.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
    const dur = s.duration ? fmtDur(s.duration) : '';

    let tags = '';
    if (def.type === 'gym' && s.exercises) {
      Object.values(s.exercises).slice(0,3).forEach(ex => {
        const top = ex.sets?.find(st => st.weight && st.reps);
        if (top) tags += `<div class="history-tag">${ex.name}: ${top.weight}kg×${top.reps}</div>`;
      });
      if (s.globalRpe) tags += `<div class="history-tag">RPE ${s.globalRpe}</div>`;
    } else if (def.type === 'circuit') {
      if (s.rounds) tags += `<div class="history-tag">${s.rounds} ronden</div>`;
      if (s.rpe)    tags += `<div class="history-tag">RPE ${s.rpe}</div>`;
      if (s.finisher?.some(f => f.done)) tags += `<div class="history-tag green">Finisher ✓</div>`;
    } else if (s.type === 'snacks') {
      if (s.snackName) tags += `<div class="history-tag">${s.snackName}</div>`;
      if (s.rounds)    tags += `<div class="history-tag">${s.rounds} ronden</div>`;
      if (s.rpe)       tags += `<div class="history-tag">RPE ${s.rpe}</div>`;
    }

    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="history-item-header">
        <div>
          <div class="history-date">${dateStr} · ${timeStr}</div>
          <div class="history-type">${def.name}</div>
        </div>
        <div class="history-duration">${dur}</div>
      </div>
      ${tags ? `<div class="history-meta">${tags}</div>` : ''}`;
    item.addEventListener('click', () => Export.showForSession(s));
    return item;
  }

  function fmtDur(sec) {
    const m = Math.floor(sec/60), s = sec%60;
    return m ? `${m}m${s?` ${s}s`:''}` : `${s}s`;
  }

  return { render };
})();
const Export = (() => {
  function showForSession(s) {
    document.getElementById('export-text').value = generate(s);
    document.getElementById('modal-export').style.display='flex';
  }

  function generate(s) {
    const def = SESSION_TYPES[s.type];
    if (!def) return 'Sessie niet gevonden.';

    const d = new Date(s.timestamp || s.date);
    const dateStr = d.toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    const timeStr = d.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
    const dur = s.duration ? fmtDur(s.duration) : '—';

    // Previous session for comparison
    const allOfType = DB.getAll().filter(x => x.type === s.type && x.timestamp !== s.timestamp);
    const prev = allOfType[0] || null;

    const L = [];
    L.push('═══════════════════════════════════');
    L.push('TRAINLOG — SESSIE VERSLAG');
    L.push('═══════════════════════════════════');
    L.push(`Datum:  ${dateStr}`);
    L.push(`Tijd:   ${timeStr}`);
    L.push(`Sessie: ${def.name} (${def.tag})`);
    L.push(`Duur:   ${dur}`);
    L.push('───────────────────────────────────');

    if (def.type === 'gym' && s.exercises) {
      L.push('OEFENINGEN:');
      L.push('');
      Object.entries(s.exercises).forEach(([id, ex]) => {
        const prevEx = prev?.exercises?.[id];
        L.push(`  ${ex.name.toUpperCase()}`);
        ex.sets?.forEach((set, i) => {
          if (!set.weight && !set.reps) return;
          let line = `    Set ${i+1}: ${set.weight||'—'}kg × ${set.reps||'—'} reps`;
          if (set.rpe) line += ` (RPE ${set.rpe})`;
          const ps = prevEx?.sets?.[i];
          if (ps) {
            const wd = parseFloat(set.weight) - parseFloat(ps.weight||0);
            const rd = parseInt(set.reps) - parseInt(ps.reps||0);
            if (wd > 0) line += ` ↑ +${wd}kg`;
            else if (wd < 0) line += ` ↓ ${wd}kg`;
            if (rd > 0) line += ` ↑ +${rd} reps`;
            else if (rd < 0) line += ` ↓ ${rd} reps`;
          }
          L.push(line);
        });
        if (prevEx) {
          const pw = Math.max(...(prevEx.sets?.map(st => parseFloat(st.weight)||0)||[0]));
          const cw = Math.max(...(ex.sets?.map(st => parseFloat(st.weight)||0)||[0]));
          if (cw > pw) L.push(`    ✅ Nieuw topgewicht! ${cw}kg (was ${pw}kg)`);
        }
        if (ex.note) L.push(`    📝 ${ex.note}`);
        L.push('');
      });
      if (s.globalRpe)  L.push(`Sessie RPE: ${s.globalRpe}/10`);
      if (s.globalNote) L.push(`Notitie: ${s.globalNote}`);

    } else if (def.type === 'circuit') {
      L.push('OEFENINGEN:');
      def.exercises?.forEach((ex, i) => L.push(`  ${i+1}. ${ex.name} — ${ex.defaultWeight}`));
      L.push('');
      L.push(`Ronden: ${s.rounds||'—'} / ${def.rounds}`);
      if (s.rpe) L.push(`RPE: ${s.rpe}/10`);
      if (prev) {
        const diff = (s.rounds||0) - (prev.rounds||0);
        if (diff > 0) L.push(`✅ +${diff} ronde(n) meer dan vorige sessie!`);
        else if (diff < 0) L.push(`↓ ${Math.abs(diff)} ronde(n) minder`);
        else L.push('→ Zelfde aantal ronden');
        const rpediff = (s.rpe||5) - (prev.rpe||5);
        if (rpediff < 0) L.push(`✅ RPE ${Math.abs(rpediff)} lager — efficiënter!`);
      }
      if (s.finisher?.length) {
        L.push(''); L.push('FINISHER:');
        s.finisher.forEach(f => L.push(`  ${f.done ? '✓' : '✗'} ${f.name}`));
      }
      if (s.note) L.push(`\nNotitie: ${s.note}`);

    } else if (s.type === 'snacks') {
      const opt = SESSION_TYPES.snacks?.options?.find(o => o.id === s.snackId);
      if (opt) {
        L.push(`Snack:    ${opt.name}`);
        L.push(`Protocol: ${opt.protocol}`);
        L.push('Oefeningen:');
        opt.exercises.forEach(e => L.push(`  • ${e}`));
        L.push('');
      }
      L.push(`Ronden: ${s.rounds||'—'}`);
      if (s.rpe) L.push(`RPE: ${s.rpe}/10`);
      const prevSnack = s.snackId ? DB.getAll().find(x => x.type==='snacks' && x.snackId===s.snackId && x.timestamp!==s.timestamp) : null;
      if (prevSnack) {
        const rd = (s.rounds||0) - (prevSnack.rounds||0);
        if (rd > 0) L.push(`✅ +${rd} ronde(n) meer dan vorige keer!`);
        if (s.rpe && prevSnack.rpe && s.rpe < prevSnack.rpe) L.push(`✅ RPE lager (${s.rpe} vs ${prevSnack.rpe}) — beter!`);
      }
      if (s.note) L.push(`\nNotitie: ${s.note}`);
    }

    L.push('');
    L.push('───────────────────────────────────');
    L.push('RPE TREND (laatste 5 sessies):');
    const trend = DB.getAll().filter(x => x.type === s.type).slice(0, 5)
      .map(x => {
        const xd = new Date(x.timestamp||x.date);
        const rpe = x.globalRpe || x.rpe || '—';
        return `${xd.toLocaleDateString('nl-NL',{day:'numeric',month:'short'})}: ${rpe}`;
      }).join(' | ');
    L.push(trend || '— nog niet genoeg data —');
    L.push('');
    L.push('═══════════════════════════════════');
    L.push('[Gegenereerd door TrainLog]');
    L.push('Plak dit in een nieuwe chat voor');
    L.push('interpretatie en advies.');
    L.push('═══════════════════════════════════');

    return L.join('\n');
  }

  function generateAll() {
    const all = DB.getAll();
    if (!all.length) return 'Geen sessies.';
    return all.slice(0, 20).map(s => generate(s)).join('\n\n───────────────────────────────────\n\n');
  }

  function fmtDur(sec) {
    const m = Math.floor(sec/60), s = sec%60;
    return m ? `${m}min${s?` ${s}sec`:''}` : `${sec}sec`;
  }

  return { showForSession, generateAll };
})();
// ─── HELPERS ───────────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const t = document.getElementById(id);
  if (t) { t.classList.add('active'); t.scrollTop = 0; }
}

function showToast(msg) {
  document.querySelector('.toast')?.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}

// ─── APP ───────────────────────────────────────────────────────────────────

const App = (() => {
  function init() {
    setDate();
    refreshHome();
    bindHome();
    bindSession();
    bindHistory();
    bindExportModal();
    registerSW();
  }

  function setDate() {
    document.getElementById('hero-date').textContent =
      new Date().toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long' });
  }

  function refreshHome() {
    const all = DB.getAll();
    const weekStart = new Date();
    weekStart.setDate(weekStart.getDate() - ((weekStart.getDay()+6)%7));
    weekStart.setHours(0,0,0,0);
    const weekCount = all.filter(s => new Date(s.timestamp||s.date) >= weekStart).length;
    const last = all[0];
    const lastStr = last
      ? new Date(last.timestamp||last.date).toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'})
      : '—';

    document.getElementById('hero-stats').innerHTML = `
      <div class="hero-stat">
        <div class="hero-stat-val">${weekCount}</div>
        <div class="hero-stat-lbl">DEZE WEEK</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val">${all.length}</div>
        <div class="hero-stat-lbl">TOTAAL</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val" style="font-size:17px;margin-top:4px">${lastStr}</div>
        <div class="hero-stat-lbl">LAATSTE</div>
      </div>`;
  }

  function bindHome() {
    document.querySelectorAll('.session-card').forEach(card => {
      card.addEventListener('click', () => Session.open(card.dataset.type));
    });
    document.getElementById('btn-history').addEventListener('click', () => {
      History.render();
      showScreen('screen-history');
    });
    document.getElementById('btn-export').addEventListener('click', () => {
      const all = DB.getAll();
      if (!all.length) { showToast('Nog geen sessies gelogd.'); return; }
      Export.showForSession(all[0]);
    });
  }

  function bindSession() {
    document.getElementById('btn-back').addEventListener('click', () => {
      if (confirm('Sessie stoppen? Voortgang gaat verloren.')) {
        Session.close(); Timer.stop(); RestBanner.hide();
        showScreen('screen-home');
      }
    });
    document.getElementById('btn-finish').addEventListener('click', () => Session.finish());
  }

  function bindHistory() {
    document.getElementById('btn-back-history').addEventListener('click', () => showScreen('screen-home'));
  }

  function bindExportModal() {
    const close = () => document.getElementById('modal-export').style.display='none';
    document.getElementById('btn-modal-close').addEventListener('click', close);
    document.querySelector('#modal-export .modal-backdrop').addEventListener('click', close);

    document.getElementById('btn-copy').addEventListener('click', () => {
      const txt = document.getElementById('export-text').value;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(txt).then(() => showToast('Gekopieerd! ✓'));
      } else {
        document.getElementById('export-text').select();
        document.execCommand('copy');
        showToast('Gekopieerd! ✓');
      }
    });

    document.getElementById('btn-copy-all').addEventListener('click', () => {
      const txt = Export.generateAll();
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => showToast('Alle logs gekopieerd! ✓'));
    });
  }

  function registerSW() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
    }
  }

  return { init, refreshHome };
})();

document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
