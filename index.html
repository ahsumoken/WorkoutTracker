<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <!-- Tailwind CSS voor loeistrakke styling en contrast -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="flex flex-col min-h-screen justify-between p-4 font-sans">

    <!-- TOP BAR (Categorie & Voortgang - Extra Groot) -->
    <div class="text-center pt-4">
        <span id="category-display" class="text-2xl md:text-3xl font-black uppercase tracking-widest text-blue-400 block mb-1">
            STARTEN...
        </span>
        <div id="progress-text" class="text-base font-bold text-slate-400 uppercase tracking-wider">0 / 0 Oefeningen</div>
    </div>

    <!-- MAIN TRACKING SCREEN (Gigantische leesbaarheid voor tijdens het trainen) -->
    <div class="w-full max-w-3xl mx-auto my-auto text-center px-2">
        <h1 id="exercise-title" class="text-5xl md:text-7xl font-black text-white leading-tight tracking-tight mb-6">
            Klik op 'Start'
        </h1>
        <div id="weight-display" class="text-4xl md:text-6xl font-black text-emerald-400 mb-2">--</div>
    </div>

    <!-- CONTROLS (Enorme, huishoudfitte knoppen voor dikke vingers en zweet) -->
    <div class="w-full max-w-2xl mx-auto space-y-4 pb-6">
        
        <!-- NAVIGATIE GRID -->
        <div class="grid grid-cols-2 gap-4">
            <!-- VORIGE KNOP -->
            <button id="btn-prev" onclick="changeExercise(-1)" class="p-7 text-2xl font-black uppercase bg-slate-800 text-slate-300 rounded-2xl border-2 border-slate-700 active:bg-slate-700 transition-all disabled:opacity-20 disabled:pointer-events-none">
                ⬅️ Vorige
            </button>
            
            <!-- SKIP / VOLGENDE KNOP -->
            <button id="btn-next" onclick="changeExercise(1)" class="p-7 text-2xl font-black uppercase bg-blue-600 text-white rounded-2xl border-2 border-blue-500 active:bg-blue-700 transition-all">
                START ➡️
            </button>
        </div>
    </div>

    <!-- APP LOGICA (Harde Database, Navigatie & Wake Lock) -->
    <script>
        // 1. DE HARDE DATABASE (Exact jouw 3 categorieën, alle troep is weggesmeten)
        const workoutDatabase = {
            "Kettlebell": [
                {"name": "Kettlebell Swing", "weight": "20 KG"},
                {"name": "Kettlebell Goblet Squat", "weight": "20 KG"},
                {"name": "Kettlebell Turkish Get-Up", "weight": "20 KG"},
                {"name": "Kettlebell Snatch", "weight": "20 KG"},
                {"name": "Kettlebell Clean & Press", "weight": "20 KG"},
                {"name": "Kettlebell Thruster", "weight": "20 KG"},
                {"name": "Kettlebell Windmill", "weight": "20 KG"},
                {"name": "Kettlebell TV Bicep Curl", "weight": "20 KG"},
                {"name": "Kettlebell TV Tricep Extension", "weight": "20 KG"}
            ],
            "One Gym": [
                {"name": "Lat Pulldown (Cable)", "weight": "Kabel"},
                {"name": "Seated Row (Machine)", "weight": "Machine"},
                {"name": "Incline Bench Press (Smith)", "weight": "Smith Machine"},
                {"name": "Chest Press (Machine)", "weight": "Machine"},
                {"name": "Iso-Lateral Row (Machine)", "weight": "Machine"},
                {"name": "Tricep Pushdown (Cable)", "weight": "Kabel"},
                {"name": "Bicep Curl (Cable)", "weight": "Kabel"},
                {"name": "Leg Press (Machine)", "weight": "Machine"}
            ],
            "Core": [
                {"name": "Ab Wheel Rollout", "weight": "Reps"},
                {"name": "Plank", "weight": "Tijd / Lichaamsgewicht"},
                {"name": "Hanging Leg Raise", "weight": "Reps"},
                {"name": "Russian Twist", "weight": "Reps"},
                {"name": "Bicycle Crunch", "weight": "Reps"}
            ]
        };

        // Maak één platte lijst van alle oefeningen voor de actieve sessie
        let exercises = [];
        Object.keys(workoutDatabase).forEach(category => {
            workoutDatabase[category].forEach(ex => {
                exercises.push({ ...ex, category: category });
            });
        });

        let currentIndex = -1; // Begint vóór de start
        let wakeLock = null;

        // 2. WAKE LOCK: Voorkom dat het scherm uitgaat (Geforceerd aanhouden)
        async function acquireWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("Wake Lock actief: Scherm blijft aan.");
                }
            } catch (err) {
                console.log(`Wake Lock mislukt: ${err.message}`);
            }
        }

        // Automatisch heractiveren als je terugkeert naar de app (visibility check)
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && currentIndex >= 0) {
                await acquireWakeLock();
            }
        });

        // 3. UPDATE INTERFACE (Mega letters & Contrast)
        function updateUI() {
            if (currentIndex < 0) {
                document.getElementById('category-display').innerText = "KLAAR VOOR DE START";
                document.getElementById('exercise-title').innerText = "Start je Workout";
                document.getElementById('weight-display').innerText = "20 KG & GYM READY";
                document.getElementById('btn-prev').disabled = true;
                document.getElementById('btn-next').innerText = "START ➡️";
                return;
            }

            const current = exercises[currentIndex];
            
            // Pas tekst aan met keihard contrast
            document.getElementById('category-display').innerText = current.category;
            document.getElementById('exercise-title').innerText = current.name;
            document.getElementById('weight-display').innerText = current.weight;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${exercises.length} Oefeningen`;
            
            // Knoppen-beheer (Skip / Vorige)
            document.getElementById('btn-prev').disabled = (currentIndex === 0);
            document.getElementById('btn-next').innerText = (currentIndex === exercises.length - 1) ? "KLAAR 🎉" : "SKIP ➡️";
        }

        // 4. NAVIGATIE LOGICA (Skip & Vorige)
        async function changeExercise(direction) {
            // Activeer Wake Lock bij de eerste klik op Start
            if (currentIndex === -1) {
                await acquireWakeLock();
            }

            currentIndex += direction;
            
            // Einde van de workout bereikt
            if (currentIndex >= exercises.length) {
                document.getElementById('category-display').innerText = "FINISH";
                document.getElementById('exercise-title').innerText = "Workout Voltooid! 🦾";
                document.getElementById('weight-display').innerText = "Lekker gewerkt, Richard!";
                document.getElementById('progress-text').innerText = "Alles Afgevinkt";
                document.getElementById('btn-next').disabled = true;
                document.getElementById('btn-prev').disabled = true;
                
                if (wakeLock) {
                    await wakeLock.release();
                    wakeLock = null;
                }
                return;
            }
            
            if (currentIndex < 0) currentIndex = -1;
            updateUI();
        }

        // Eerste render bij laden van de pagina
        window.onload = updateUI;
    </script>
</body>
</html>
