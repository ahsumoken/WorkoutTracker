<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainLog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h2 id="workout-title">Kettlebell Circuit A</h2>
            <p id="workout-meta" class="workout-meta">18 sets · 45s werk / 15s rust · 3 ronden</p>
        </div>

        <div class="exercises-list" id="exercises-container">
            </div>

        <div class="finisher-section">
            <h3>FINISHER PROTOCOL</h3>
            <p class="finisher-sub">Pas de herhalingen en gewichten hieronder handmatig aan</p>
            <div class="finisher-list" id="finisher-container">
                </div>
        </div>

        <div class="action-zone">
            <button id="btn-start-workout" class="btn-main-start">START WORKOUT</button>
        </div>
    </div>

    <div id="modal-timer" class="timer-modal" style="display: none;">
        <div class="timer-content">
            <div class="timer-header">
                <span id="timer-set-info">Set 1 / 18</span>
                <span id="timer-round-info">Ronde 1 / 3</span>
            </div>
            
            <div class="timer-circle-container">
                <svg class="timer-ring" width="200" height="200">
                    <circle class="timer-ring-bg" cx="100" cy="100" r="88" stroke-width="8" fill="transparent"/>
                    <circle id="timer-ring-fg" class="timer-ring-fg" cx="100" cy="100" r="88" stroke-width="8" fill="transparent" stroke-dasharray="552.92" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-text-zone">
                    <div id="timer-display" class="timer-time">0:45</div>
                    <div id="timer-phase" class="timer-phase">WERK</div>
                </div>
            </div>

            <div class="timer-exercise-display">
                <h1 id="timer-exercise-name">—</h1>
                <p id="timer-next-exercise-name">Volgende: —</p>
            </div>

            <div class="timer-controls">
                <button id="btn-timer-stop" class="btn-timer-secondary">STOP</button>
                <button id="btn-timer-pause" class="btn-timer-primary">PAUZE</button>
                <button id="btn-timer-skip" class="btn-timer-secondary">SKIP</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="timer.js"></script>
</body>
</html>
