<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrainLog">
  <title>TrainLog</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep.js/0.12.0/NoSleep.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-mark">▲</span>
          <span class="logo-text">TRAINLOG</span>
        </div>
        <div class="header-actions">
          <button id="btn-history" class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4"/><polyline points="3 16 3.05 11 8 11"/></svg>
          </button>
          <button id="btn-export" class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>
    </header>

    <div id="screen-home" class="screen active">
      <div class="home-hero">
        <div class="hero-stats" id="hero-stats"></div>
        <div class="hero-label">VANDAAG</div>
        <div class="hero-date" id="hero-date"></div>
      </div>
      <div class="session-grid">
        <div id="active-session-banner" style="display:none;grid-column:1/-1;background:rgba(249,115,22,0.12);border:1.5px solid rgba(249,115,22,0.4);border-radius:var(--radius);padding:14px 16px;align-items:center;justify-content:space-between;gap:12px;">
          <div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;color:var(--accent-orange);">● SESSIE ACTIEF</div>
            <div id="active-session-name" style="font-size:15px;font-weight:600;margin-top:2px;"></div>
          </div>
          <div style="display:flex;gap:8px;">
            <button id="btn-resume-session" style="background:var(--accent-orange);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.06em;cursor:pointer;">HERVAT</button>
            <button id="btn-discard-session" style="background:var(--bg-3);color:var(--text-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;cursor:pointer;">✕</button>
          </div>
        </div>
        <div class="section-label">KIES SESSIE</div>
        <button class="session-card" data-type="compounds-a">
          <div class="session-card-accent" style="background:#3b82f6"></div>
          <div class="session-tag">GYM A</div>
          <div class="session-name">Compounds A</div>
          <div class="session-sub">Squat · Deadlift · Bench · Row · OHP</div>
          <div class="session-sets">6 oefeningen · ~60 min</div>
        </button>
        <button class="session-card" data-type="compounds-b">
          <div class="session-card-accent" style="background:#06b6d4"></div>
          <div class="session-tag">GYM B</div>
          <div class="session-name">Compounds B</div>
          <div class="session-sub">RDL · Incline · Pull-up · Press</div>
          <div class="session-sets">7 oefeningen · ~65 min</div>
        </button>
        <button class="session-card" data-type="kettlebell">
          <div class="session-card-accent" style="background:#f97316"></div>
          <div class="session-tag">CIRCUIT A</div>
          <div class="session-name">Kettlebell Circuit A</div>
          <div class="session-sub">18 sets · 0:45/0:15 · 3 ronden</div>
          <div class="session-sets">6 oefeningen + finisher</div>
        </button>
        <button class="session-card" data-type="kettlebell-b">
          <div class="session-card-accent" style="background:#f97316"></div>
          <div class="session-tag">CIRCUIT B</div>
          <div class="session-name">Kettlebell Circuit B</div>
          <div class="session-sub">Sumo · Split Squat · Push Press · Thrusters</div>
          <div class="session-sets">24 sets · 0:45/0:15 · 3 ronden</div>
        </button>
        <button class="session-card" data-type="alan-a">
          <div class="session-card-accent" style="background:#a855f7"></div>
          <div class="session-tag">ALAN A</div>
          <div class="session-name">Alan Hanik A</div>
          <div class="session-sub">Step-up · RDL · Squat · Push-up</div>
          <div class="session-sets">18 sets · 0:45/0:15 · 3 ronden</div>
        </button>
        <button class="session-card" data-type="alan-b">
          <div class="session-card-accent" style="background:#22c55e"></div>
          <div class="session-tag">ALAN B</div>
          <div class="session-name">Alan Hanik B</div>
          <div class="session-sub">Lunge · Swing · Ring Row · Split Squat</div>
          <div class="session-sets">18 sets · 0:45/0:15 · 3 ronden</div>
        </button>
        <button class="session-card" data-type="spartan-50">
          <div class="session-card-accent" style="background:#ef4444"></div>
          <div class="session-tag">SPARTAN 50</div>
          <div class="session-name">The Spartan 50</div>
          <div class="session-sub">Burpees (3 Push-ups) + 3 Jump Squats</div>
          <div class="session-sets">1 set · Gewichtsvest</div>
        </button>
        <button class="session-card" data-type="bodyweight-murph">
          <div class="session-card-accent" style="background:#6366f1"></div>
          <div class="session-tag">MURPH</div>
          <div class="session-name">Bodyweight Murph Variant</div>
          <div class="session-sub">Negatieve Pull-ups · Dips · Air Squats</div>
          <div class="session-sets">30 sets · 10 ronden · Met Vest</div>
        </button>
        <button class="session-card" data-type="kb-rope-amrap">
          <div class="session-card-accent" style="background:#f43f5e"></div>
          <div class="session-tag">AMRAP</div>
          <div class="session-name">KB & Springtouw AMRAP</div>
          <div class="session-sub">Double Unders · Cleans · Front Squats · Presses</div>
          <div class="session-sets">20 minuten · Maximaal resultaat</div>
        </button>
        <button class="session-card" data-type="ring-quest">
          <div class="session-card-accent" style="background:#0ea5e9"></div>
          <div class="session-tag">RING QUEST</div>
          <div class="session-name">The Ring Quest</div>
          <div class="session-sub">Ring Rows · Assisted Pull-ups · Support Holds</div>
          <div class="session-sets">5 oefeningen · Kracht & Controle</div>
        </button>
        <button class="session-card" data-type="snacks">
          <div class="session-card-accent" style="background:#eab308"></div>
          <div class="session-tag">SNACK</div>
          <div class="session-name">Kettlebell Snacks</div>
          <div class="session-sub">5 mini-workouts · 5-10 min</div>
          <div class="session-sets">Power · Upper · Lower · Core · Full Body</div>
        </button>
        <div style="height:100px"></div>
      </div>
    </div>

    <div id="screen-session" class="screen">
      <div class="session-header">
        <button class="back-btn" id="btn-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="session-title-wrap">
          <div class="session-title" id="session-title"></div>
          <div class="session-time" id="session-timer">00:00</div>
        </div>
        <button class="finish-btn" id="btn-finish">KLAAR</button>
      </div>
      <div id="session-content"></div>
    </div>

    <div id="screen-history" class="screen">
      <div class="session-header">
        <button class="back-btn" id="btn-back-history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="session-title-wrap">
          <div class="session-title">HISTORIE</div>
        </div>
      </div>
      <div id="history-content" class="history-list"></div>
    </div>

    <div id="modal-export" style="display:none;position:fixed;inset:0;z-index:300;align-items:flex-end;">
      <div class="modal-backdrop" id="modal-export-backdrop"></div>
      <div class="modal-box">
        <div class="modal-header">
          <span>SESSIE VERSLAG</span>
          <button id="btn-modal-close" class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <textarea id="export-text" readonly></textarea>
        <div class="modal-actions">
          <button id="btn-copy" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Kopieer
          </button>
          <button id="btn-copy-all" class="btn-secondary">Alle logs</button>
        </div>
      </div>
    </div>

    <div id="modal-timer" style="display:none;position:fixed;inset:0;z-index:300;align-items:flex-end;">
      <div class="modal-backdrop" id="modal-timer-backdrop"></div>
      <div class="modal-box timer-box">
        <div class="timer-phase" id="timer-phase">WERK</div>
        <div class="timer-progress-wrap">
          <svg class="timer-ring" viewBox="0 0 200 200">
            <circle class="timer-ring-bg" cx="100" cy="100" r="88"/>
            <circle class="timer-ring-fg" id="timer-ring-fg" cx="100" cy="100" r="88"/>
          </svg>
          <div class="timer-display" id="timer-display">0:45</div>
        </div>
        <div class="timer-meta">
          <div class="timer-set" id="timer-set-info">Set 1 / 18</div>
          <div class="timer-round" id="timer-round-info">Ronde 1 / 3</div>
          <div class="timer-exercise" id="timer-exercise-name"></div>
        </div>
        <div class="timer-controls">
          <button id="btn-timer-pause" class="btn-timer">
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button id="btn-timer-skip" class="btn-timer" style="color:var(--accent-cyan); border-color:rgba(6,182,212,0.3);" title="Sla oefening over">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
              <polygon points="5 4 15 12 5 20 5 4" fill="currentColor"></polygon>
              <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="3"></line>
            </svg>
          </button>
          <button id="btn-timer-stop" class="btn-timer btn-timer-stop">■ STOP</button>
        </div>
      </div>
    </div>

    <div id="rest-banner" style="display:none;position:fixed;bottom:calc(16px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:var(--bg-3);border:1px solid var(--border-bright);border-radius:var(--radius);overflow:hidden;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.6);">
      <div class="rest-inner">
        <span class="rest-label">RUST</span>
        <span class="rest-time" id="rest-time-display">90</span>
        <span class="rest-unit">sec</span>
        <button id="btn-skip-rest" class="rest-skip">SKIP</button>
      </div>
      <div class="rest-bar-wrap"><div class="rest-bar" id="rest-bar"></div></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="timer.js"></script>
  <script src="session.js"></script>
  <script src="app.js"></script>
</body>
</html>
